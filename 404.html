<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#080B10" />
<title>404 — Fuera de ruta · IBS</title>
<meta name="description" content="La página que buscas se salió del mapa." />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#080B10;--paper:#F4F6F8;--paper-3:#FFFFFF;
    --line-light:rgba(9,14,20,.10);--line-light-strong:rgba(9,14,20,.22);
    --graphite:#586374;--text-dark:#0A0F16;--text-mute:#5A6472;
    --accent:#1F6BFF;--accent-sky:#8FC4FF;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--text-dark);min-height:100vh;
    display:flex;flex-direction:column;
    background:
      radial-gradient(120% 90% at 82% 6%,rgba(31,107,255,.10),transparent 46%),
      radial-gradient(100% 80% at 10% 100%,rgba(143,196,255,.16),transparent 50%),
      linear-gradient(180deg,#F7F9FB 0%,#EDF1F5 100%);}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#fff}

  .top{display:flex;align-items:center;justify-content:space-between;
    padding:26px clamp(20px,5vw,56px)}
  .brand{font-family:"Archivo",sans-serif;font-weight:900;font-size:22px;letter-spacing:.06em;
    display:flex;align-items:center;gap:9px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px rgba(31,107,255,.16)}
  .top a.back{font-family:"Archivo",sans-serif;font-weight:600;font-size:14px;color:var(--text-mute);
    display:inline-flex;gap:8px;align-items:center;transition:color .3s}
  .top a.back:hover{color:var(--text-dark)}

  main{flex:1;display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(30px,6vw,80px);
    align-items:center;max-width:1240px;width:100%;margin:0 auto;
    padding:clamp(20px,4vw,50px) clamp(20px,5vw,56px) clamp(40px,7vw,90px)}

  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;font-weight:500;color:var(--accent);
    display:inline-flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--accent)}
  .code{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:-.05em;line-height:.82;
    font-size:clamp(96px,20vw,220px);
    background:linear-gradient(180deg,#0A0F16 0%,#586374 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;margin:14px 0 6px}
  h1{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:-.03em;line-height:1.0;
    font-size:clamp(28px,4.4vw,52px);margin:6px 0 18px}
  p{font-size:clamp(15px,1.4vw,19px);line-height:1.6;color:var(--text-mute);max-width:44ch;margin-bottom:34px}
  .actions{display:flex;gap:14px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:10px;font-family:"Archivo",sans-serif;
    font-weight:600;font-size:14px;padding:15px 26px;border-radius:100px;border:1px solid transparent;
    transition:all .4s var(--ease);cursor:pointer}
  .btn .ar{transition:transform .4s var(--ease)}
  .btn:hover .ar{transform:translateX(4px)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#0E5AF0;box-shadow:0 10px 30px rgba(31,107,255,.35)}
  .btn-ghost{background:transparent;color:var(--text-dark);border-color:var(--line-light-strong)}
  .btn-ghost:hover{border-color:var(--text-dark);background:var(--text-dark);color:#fff}

  .stage{position:relative;display:flex;align-items:center;justify-content:center}
  .stage .floor{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);
    width:70%;height:44px;background:radial-gradient(ellipse at center,rgba(8,14,24,.20),transparent 70%);
    filter:blur(6px)}
  .stage img{width:100%;max-width:560px;mix-blend-mode:multiply;
    filter:drop-shadow(0 30px 26px rgba(8,14,24,.26))}

  @media(max-width:820px){
    main{grid-template-columns:1fr;text-align:center;gap:20px}
    .eyebrow{justify-content:center}
    .eyebrow::before{display:none}
    .stage{order:-1}
    p{margin-left:auto;margin-right:auto}
    .actions{justify-content:center}
  }
</style>
</head>
<body>
  <div class="top">
    <a href="/" class="brand"><span class="dot"></span>IBS</a>
    <a href="/" class="back">Inicio <span class="ar">→</span></a>
  </div>

  <main>
    <div>
      <span class="eyebrow">Error 404 · Fuera de ruta</span>
      <div class="code">404</div>
      <h1>Esta ruta no existe.</h1>
      <p>La página que buscas se salió del mapa. Volvamos a la ruta principal y sigamos electrificando tu flota.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Volver al inicio <span class="ar">→</span></a>
        <a href="/#electricos" class="btn btn-ghost">Ver la flota</a>
      </div>
    </div>
    <div class="stage">
      <div class="floor"></div>
      <img src="assets/maxence.png" alt="IBS Maxence" />
    </div>
  </main>
</body>
</html>
