<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1418">
<title>Página no encontrada · IBS</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#0E7490;--ink:#0F1720;--mute:#5A6472}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;
    background:radial-gradient(120% 90% at 80% 0%,rgba(14,116,144,.10),transparent 46%),linear-gradient(180deg,#FFFFFF,#EAF3F5);-webkit-font-smoothing:antialiased}
  .top{padding:22px clamp(20px,5vw,48px)}
  .brand{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:.06em;font-size:20px;display:inline-flex;align-items:center;gap:9px;color:var(--ink);text-decoration:none}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px 24px 90px}
  .code{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:-.05em;line-height:.85;
    font-size:clamp(96px,22vw,220px);background:linear-gradient(180deg,#0F1720,#0E7490);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.02em;font-size:clamp(24px,4vw,40px);margin:6px 0 12px}
  p{color:var(--mute);font-size:clamp(15px,1.5vw,18px);max-width:44ch;line-height:1.6;margin-bottom:32px}
  .btn{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;font-family:"Archivo",sans-serif;font-weight:700;
    font-size:15px;padding:14px 26px;border-radius:100px;text-decoration:none;transition:.25s}
  .btn:hover{background:#0B6070;box-shadow:0 12px 30px rgba(14,116,144,.35)}
</style>
</head>
<body>
  <div class="top"><a href="/" class="brand"><span class="dot"></span>IBS</a></div>
  <main>
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o cambió de lugar. Volvamos a la ruta principal.</p>
    <a href="/" class="btn">Volver al inicio →</a>
  </main>
</body>
</html>
